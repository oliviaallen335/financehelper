<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance Study Helper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="layout">
      <aside class="sidebar">
        <h1>Finance Study Helper</h1>
        <p>DeepSeek + RAG + Function Calling</p>

        <section class="card">
          <h2>Actions</h2>
          <button id="quiz-btn">Create 5-question CAPM quiz</button>
          <button id="lecture-summary-btn">Summarize Lecture 1</button>
        </section>
      </aside>

      <section class="chat-panel">
        <div id="chat-log" class="chat-log"></div>

        <form id="chat-form" class="chat-form">
          <input id="message-input" type="text" placeholder="Ask about your finance notes..." required />
          <button type="submit">Send</button>
        </form>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
